<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        .error { color: red; font-size: 0.9em; }
        .success { color: green; font-size: 1em; padding: 10px; background-color: #e7f7e7; border: 1px solid green; }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <div id="message"></div>
    <form id="contactForm">
        <div>
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required>
            <span id="nameError" class="error"></span>
        </div>
        <div>
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required>
            <span id="emailError" class="error"></span>
        </div>
        <div>
            <label for="subject">Subject:</label><br>
            <input type="text" id="subject" name="subject" required>
            <span id="subjectError" class="error"></span>
        </div>
        <div>
            <label for="messageText">Your Message:</label><br>
            <textarea id="messageText" name="messageText" rows="5" required></textarea>
            <span id="messageError" class="error"></span>
        </div>
        <button type="submit">Send Message</button>
    </form>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            clearErrors();
            let isValid = true;

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const messageText = document.getElementById('messageText').value.trim();

            if (name.length < 2) {
                showError('nameError', 'Name must be at least 2 characters.');
                isValid = false;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                showError('emailError', 'Please enter a valid email address.');
                isValid = false;
            }

            if (subject.length < 5) {
                showError('subjectError', 'Subject must be at least 5 characters.');
                isValid = false;
            }

            if (messageText.length < 10) {
                showError('messageError', 'Message must be at least 10 characters.');
                isValid = false;
            }

            if (isValid) {
                submitForm({ name, email, subject, message: messageText });
            }
        });

        function showError(elementId, message) {
            document.getElementById(elementId).textContent = message;
        }

        function clearErrors() {
            const errors = document.querySelectorAll('.error');
            errors.forEach(error => error.textContent = '');
            document.getElementById('message').textContent = '';
        }

        function submitForm(data) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = 'Sending your message...';
            messageDiv.className = '';

            setTimeout(() => {
                console.log('Form submitted with data:', data);
                messageDiv.textContent = 'Thank you! Your message has been sent successfully.';
                messageDiv.className = 'success';
                document.getElementById('contactForm').reset();
            }, 1500);
        }
    </script>
</body>

<body>
    <h1>Get in Touch</h1>
    <form id="contactForm">
        <div>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
            <div id="nameError" class="error">Please enter a valid name (letters and spaces only).</div>
        </div>
        <div>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            <div id="emailError" class="error">Please enter a valid email address.</div>
        </div>
        <div>
            <label for="message">Your Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <div id="messageError" class="error">Message must be at least 10 characters long.</div>
        </div>
        <button type="submit">Send Message</button>
    </form>
    <div id="successMessage" class="success">Thank you! Your message has been sent successfully.</div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            let isValid = true;

            const name = document.getElementById('name');
            const email = document.getElementById('email');
            const message = document.getElementById('message');
            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const messageError = document.getElementById('messageError');
            const successMessage = document.getElementById('successMessage');

            nameError.style.display = 'none';
            emailError.style.display = 'none';
            messageError.style.display = 'none';
            successMessage.style.display = 'none';

            const namePattern = /^[A-Za-z\s]+$/;
            if (!namePattern.test(name.value.trim())) {
                nameError.style.display = 'block';
                isValid = false;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email.value.trim())) {
                emailError.style.display = 'block';
                isValid = false;
            }

            if (message.value.trim().length < 10) {
                messageError.style.display = 'block';
                isValid = false;
            }

            if (isValid) {
                console.log('Form submitted with data:', {
                    name: name.value,
                    email: email.value,
                    message: message.value
                });
                successMessage.style.display = 'block';
                this.reset();
            }
        });
    </script>
</body>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        .error { color: red; font-size: 0.9em; }
        input.invalid, textarea.invalid { border: 1px solid red; }
    </style>
</head>
<body>
    <h1>Get in Touch</h1>
    <form id="contactForm">
        <div>
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required>
            <span class="error" id="nameError"></span>
        </div>
        <div>
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required>
            <span class="error" id="emailError"></span>
        </div>
        <div>
            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea>
            <span class="error" id="messageError"></span>
        </div>
        <button type="submit">Send Message</button>
    </form>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            let isValid = true;

            const nameField = document.getElementById('name');
            const emailField = document.getElementById('email');
            const messageField = document.getElementById('message');
            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const messageError = document.getElementById('messageError');

            nameError.textContent = '';
            emailError.textContent = '';
            messageError.textContent = '';
            nameField.classList.remove('invalid');
            emailField.classList.remove('invalid');
            messageField.classList.remove('invalid');

            if (nameField.value.trim() === '') {
                nameError.textContent = 'Name is required.';
                nameField.classList.add('invalid');
                isValid = false;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(emailField.value.trim())) {
                emailError.textContent = 'Please enter a valid email address.';
                emailField.classList.add('invalid');
                isValid = false;
            }

            if (messageField.value.trim() === '') {
                messageError.textContent = 'Message cannot be empty.';
                messageField.classList.add('invalid');
                isValid = false;
            }

            if (isValid) {
                alert('Form submitted successfully! (This is a demo)');
                this.reset();
            }
        });
    </script>
</body>
</html>
