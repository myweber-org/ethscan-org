<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: sans-serif;
        }
        .avatar-section {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #f0f0f0;
            margin-right: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #666;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-upload {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bio-section {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <h1>User Profile</h1>
        
        <div class="avatar-section">
            <div class="avatar-preview" id="avatarPreview">
                <span>U</span>
            </div>
            <div class="avatar-upload">
                <input type="file" id="avatarInput" accept="image/*">
                <button id="uploadButton">Upload Avatar</button>
                <button id="removeButton" class="hidden">Remove Avatar</button>
            </div>
        </div>

        <div class="bio-section">
            <label for="bioTextarea"><strong>Bio:</strong></label>
            <textarea id="bioTextarea" placeholder="Tell us about yourself..."></textarea>
        </div>

        <button id="saveButton">Save Profile</button>
    </div>

    <script>
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const uploadButton = document.getElementById('uploadButton');
        const removeButton = document.getElementById('removeButton');
        const bioTextarea = document.getElementById('bioTextarea');
        const saveButton = document.getElementById('saveButton');

        let currentAvatar = null;

        uploadButton.addEventListener('click', () => {
            avatarInput.click();
        });

        avatarInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentAvatar = e.target.result;
                    updateAvatarPreview();
                };
                reader.readAsDataURL(file);
            }
        });

        removeButton.addEventListener('click', () => {
            currentAvatar = null;
            avatarInput.value = '';
            updateAvatarPreview();
        });

        function updateAvatarPreview() {
            const previewSpan = avatarPreview.querySelector('span');
            if (currentAvatar) {
                let img = avatarPreview.querySelector('img');
                if (!img) {
                    img = document.createElement('img');
                    avatarPreview.innerHTML = '';
                    avatarPreview.appendChild(img);
                }
                img.src = currentAvatar;
                removeButton.classList.remove('hidden');
            } else {
                avatarPreview.innerHTML = '<span>U</span>';
                removeButton.classList.add('hidden');
            }
        }

        saveButton.addEventListener('click', () => {
            const bio = bioTextarea.value.trim();
            const profileData = {
                avatar: currentAvatar,
                bio: bio
            };
            console.log('Profile saved:', profileData);
            alert('Profile saved successfully!');
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedBio = localStorage.getItem('userBio');
            const savedAvatar = localStorage.getItem('userAvatar');
            if (savedBio) {
                bioTextarea.value = savedBio;
            }
            if (savedAvatar) {
                currentAvatar = savedAvatar;
                updateAvatarPreview();
            }
            saveButton.addEventListener('click', () => {
                localStorage.setItem('userBio', bioTextarea.value);
                if (currentAvatar) {
                    localStorage.setItem('userAvatar', currentAvatar);
                } else {
                    localStorage.removeItem('userAvatar');
                }
            });
        });
    </script>
</body>
</html>
