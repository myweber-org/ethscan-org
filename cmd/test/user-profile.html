<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
</head>
<body>
    <header>
        <h1>User Profile</h1>
    </header>
    <main>
        <section class="profile-card">
            <div class="avatar-container">
                <img src="avatar-placeholder.jpg" alt="User Avatar" width="150" height="150">
            </div>
            <div class="profile-info">
                <h2 class="user-name">Alex Johnson</h2>
                <p class="user-bio">Software developer with a passion for open-source projects and web technologies.</p>
                <div class="user-stats">
                    <span class="stat">Repositories: 42</span>
                    <span class="stat">Followers: 128</span>
                    <span class="stat">Following: 56</span>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>Profile last updated: <time datetime="2023-10-27">October 27, 2023</time></p>
    </footer>
</body>
</html>
